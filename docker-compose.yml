# Production stack for the Raspberry Pi. `docker compose up -d --build` builds
# the PWA+PocketBase image and starts Caddy for automatic HTTPS.
#
# Requires a .env file next to this one with at least:
#   DOMAIN=yourname.duckdns.org
# and (only if you use the optional ddns profile):
#   DUCKDNS_SUBDOMAIN=yourname
#   DUCKDNS_TOKEN=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
services:
  pocketbase:
    build:
      context: .
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data # the one thing to back up
    expose:
      - '8090'

  caddy:
    build:
      context: ./caddy # Caddy + DuckDNS DNS plugin (for the DNS-01 challenge)
    restart: unless-stopped
    ports:
      - '443:443' # no port 80 — DNS-01 doesn't need it, so Pi-hole keeps 80
    environment:
      - DOMAIN=${DOMAIN}
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - pocketbase

  # One-off: bootstrap the first admin (talks to PocketBase over the internal
  # network, so it works on the Pi without NAT-loopback to your public URL):
  #   PB_SUPERUSER_EMAIL=you@example.com PB_SUPERUSER_PASSWORD='...' \
  #   ADMIN_NAME="Adam" docker compose --profile seed run --rm seed-admin
  seed-admin:
    profiles: ['seed']
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app:ro
    environment:
      - PB_URL=http://pocketbase:8090
      - APP_URL=https://${DOMAIN}
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD:-}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
    entrypoint: ['node', 'seed-admin.mjs']
    depends_on:
      - pocketbase

  # Optional: keep your DuckDNS record pointed at your home IP. Opt in with:
  #   docker compose --profile ddns up -d
  # (skip if your router already does dynamic DNS).
  duckdns:
    profiles: ['ddns']
    image: lscr.io/linuxserver/duckdns:latest
    restart: unless-stopped
    environment:
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}

volumes:
  pb_data:
  caddy_data:
  caddy_config:
